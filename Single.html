<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="myStyles.css" type="text/css">
    <!-- Need the following for dropdowns and maybe other things-->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="scripts.js"></script>
    <script>
      let _localGroups;
      let _numberOfImages;
      let _currentImageIndex;
      function loadData(){
        var params = new URLSearchParams(window.location.search),
        one = params.get("library"),
        two = params.get("index");

        _currentImageIndex = two;

        loadXml(one);
      }

      function loadXml(library){
        path = "";
        if (library == "Fractals"){
          path = "Images//Fractals.xml";
          document.getElementById("GalleryName").innerHTML = "Julia Sets";
        }
        else if (library == "Fractal3d"){
          path = "Images//Fractal3d.xml";
          document.getElementById("GalleryName").innerHTML = "Fractals 3D";
        }
        else if (library == "Automata"){
          path = "Images//Automata.xml";
          document.getElementById("GalleryName").innerHTML = "Automata";
        }
        else if (library == "Attractors"){
          path = "Images//Attractors.xml";
          document.getElementById("GalleryName").innerHTML = "Attractors";
        }

        var xmlhttp = new XMLHttpRequest();
        xmlhttp.onreadystatechange = function() {
          if (this.readyState == 4 && this.status == 200) {
            loadGroupsForSingle(this);
          }
        };
        xmlhttp.open("GET", path, true); 
        xmlhttp.send();
      }

      function loadSingleGroups(groups) { 
        _localGroups = groups;
        _numberOfImages = _localGroups.length;

        let indexVal = Number(_currentImageIndex);

        if(indexVal < _numberOfImages){
          image = getBestSizedImage(_localGroups[indexVal], 700);
          document.getElementById("current_image").src = image.ImagePath;
          document.getElementById("ImageName").innerHTML = image.Name;
        }
      }

      function previousImage(){
        let indexVal = Number(_currentImageIndex);
        indexVal--;
        if(indexVal < 0){
          indexVal = _numberOfImages - 1;
        }
        _currentImageIndex = indexVal;
        image = getBestSizedImage(_localGroups[indexVal], 700);
        document.getElementById("current_image").src = image.ImagePath;
        document.getElementById("ImageName").innerHTML = image.Name;
      }

      function nextImage(){
        let indexVal = Number(_currentImageIndex);
        indexVal++;
        if(indexVal >= _numberOfImages){
          indexVal = 0;
        }
        _currentImageIndex = indexVal;
        image = getBestSizedImage(_localGroups[indexVal], 700);
        document.getElementById("current_image").src = image.ImagePath;
        document.getElementById("ImageName").innerHTML = image.Name;
      }
  </script>
</head>

          <li><a class="dropdown-item" href="GalleryJuliaSets.html">Julia Sets</a></li>
          <li><a class="dropdown-item" href="GalleryAutomata.html">Cellular Automata</a></li>
          <li><a class="dropdown-item" href="GalleryAttractors.html">Strange Attractors</a></li>
          <li><a class="dropdown-item" href="GalleryFractal3d.html">3D Fractals</a></li>
        </ul>
      </li>
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">Algorithms</a>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="FractalAlgorithm.html">Julia and Mandelbrot Sets</a></li>
          <li><a class="dropdown-item" href="AutomataAlgorithm.html">Cellular Automata</a></li>
          <li><a class="dropdown-item" href="AttractorAlgorithm.html">Strange Attractors</a></li>
        </ul>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="About.html">About</a>
      </li>
    </ul>

    <div class="container-fluid">
      <div class="row">
        <div class="col-sm-3 p-1 vertical-center-right" >
          <button onclick="previousImage()" class="imageButton"><Image src="Images/back2.png" alt="Previous"></button>
        </div>
        <div class="col-sm-6 p-1">
            <img class="img-fluid single-image centerImage" id="current_image">      
        </div>
        <div class="col-sm-3 p-1 vertical-center-left">
          <button onclick="nextImage()" class="imageButton float-start"><image src="Images/forward2.png" alt="Next"></button>

      <h4 style="text-align:center" id="ImageName"></4>
